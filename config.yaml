app:
  name: ATLAS
  version: "0.1.0"
  window:
    width: 1280
    height: 860
    fullscreen: false
    always_on_top: false

ui:
  theme: dark
  background_color: "#050510"
  accent_color_idle: "#0055FF"
  accent_color_listening: "#0088FF"
  accent_color_responding: "#00EEFF"
  accent_color_thinking: "#8844FF"
  font_family: "Share Tech Mono"
  font_size: 14
  orb_radius: 170
  particle_count: 80
  fps: 60

voice:
  wake_word: "atlas"
  whisper_model: "auto"              # auto = detect chip (M1→base.en, M2/M3/M4→small.en, Intel→tiny.en)
  piper_voice: "en_US-ryan-high"     # primary TTS voice (JARVIS HF URL is dead)
  tts_model: "en_US-ryan-high"       # legacy key; piper_voice takes precedence
  voice_fallback: "en_US-ryan-high"  # fallback (same — keep consistent)
  voice_model: "en_US-ryan-high"     # canonical key
  speech_rate: 1.0                   # 0.25–4.0; higher = faster
  voice_enabled: true                # false = text only, no audio output
  voice_length_scale: 0.95          # slightly slower for clarity
  voice_noise_scale: 0.333          # reduces robotic artifacts
  voice_noise_w: 0.333              # smoother prosody
  sample_rate: 16000
  chunk_size: 1024
  amplitude_smoothing: 0.12
  tts_streaming: true               # speak sentence 1 while synthesising sentence 2
  vad_enabled: true                 # use WebRTC VAD for instant speech-end detection
  response_cache_enabled: true      # cache 50 most common command responses
  response_cache_size: 50

api:
  # ── AI Brains ───────────────────────────────────────────────────────────────
  mlx_model: "mlx-community/Llama-3.2-3B-Instruct-4bit"   # fast local voice (Apple Silicon)
  groq_model: "llama-3.3-70b-versatile"                    # deep reasoning + cloud fallback (GROQ_API_KEY)
  qwen_coder: "qwen/qwen3-coder:free"                       # full-project codegen (OPENROUTER_API_KEY)
  qwen_reasoning: "openai/gpt-oss-120b:free"               # deep multi-step reasoning (OPENROUTER_API_KEY)
  vision_model: "qwen/qwen2.5-vl-7b-instruct:free"         # multimodal vision model for screen + webcam (OPENROUTER_API_KEY)
  # ── Markets ─────────────────────────────────────────────────────────────────
  tracked_crypto: ["bitcoin", "ethereum"]
  tracked_stocks: ["AAPL", "TSLA"]

routing_mode: auto        # auto | claude | groq
user_name: "Boss"

core:
  max_history_turns: 12        # number of user+assistant turn pairs kept in context
  groq_max_tokens: 450         # short voice responses
  temperature: 0.7
  response_timeout: 20         # seconds before giving up on an API call

web:
  max_results: 5             # search results per query
  max_page_chars: 5000       # characters extracted from top result page
  enable_fetch: true         # set false to disable deep URL fetching

brain:
  max_tokens: 1024           # max tokens for Claude voice responses

dashboard:
  visible_on_startup: false  # don't pop up dashboard on launch
  briefing_time: "08:00"     # daily briefing trigger time (HH:MM)

location_lat: 51.5           # set your latitude  (used by Weather widget)
location_lon: -0.1           # set your longitude (used by Weather widget)

news_topics: ["technology", "world"]

safety:
  confirm_destructive_commands: true
  confirm_file_access_outside_project: true
  confirm_core_modifications: true
  restricted_commands:
    - "rm -rf"
    - "format"
    - "del /f"
    - "mkfs"
    - "dd if="

self_editor:
  changelog_path: "changelog.json"
  backup_dir: ".atlas_backups"
  max_backups: 50

obsidian:
  vault_path: "/Users/kairavpereira/Desktop/atlas/ATLAS"  # full path to your Obsidian vault folder
  daily_folder: "Daily"
  notes_folder: "Notes"
  tasks_file: "Tasks/tasks.md"
  research_folder: "Research"
  inbox_file: "Inbox/inbox.md"
  auto_daily_note: true
  save_briefing_to_daily: true
  ask_before_saving_research: true

# ── Chrome Control ────────────────────────────────────────────────────────────
chrome:
  chrome_control_enabled: true
  chrome_debug_port: 9222
  chrome_auto_relaunch: false    # don't launch Chrome on startup; connect to existing only
  form_safety_enabled: true
  require_confirmation_before_submit: true

# ── Sound design ──────────────────────────────────────────────────────────────
sound_effects_enabled: true
sound_volume: 0.3
ambient_hum_enabled: false
ambient_hum_volume: 0.05

# ── Morning briefing ──────────────────────────────────────────────────────────
morning_briefing_time: "08:00"

# ── Skills system ─────────────────────────────────────────────────────────────
skills_folder: "./skills"

# ── Proactive suggestions ─────────────────────────────────────────────────────
proactive_suggestions: true
proactive_min_interval_minutes: 10

# ── Cursor overlay ────────────────────────────────────────────────────────────
overlay_mode: "normal"              # minimal | normal | full

# ── Screen vision ─────────────────────────────────────────────────────────────
vision_enabled: true
watch_mode_interval: 30            # seconds between screenshots in watch mode

# ── Push-to-talk ──────────────────────────────────────────────────────────────
push_to_talk_hotkey: "cmd+space"

# ── Market research ───────────────────────────────────────────────────────────
watchlist: ["AAPL", "TSLA", "NVDA"]

market:
  market_update_interval: 300       # seconds between background price refreshes
  market_hours_only_updates: true   # only refresh during US market hours
  save_research_to_obsidian: true   # auto-save research reports to vault

# ── Camera Module ─────────────────────────────────────────────────────────────
camera_enabled: true
camera_index: 0               # webcam index (0 = default built-in camera)

# ── ACE Playbook System ───────────────────────────────────────────────────────
playbook_enabled: true
playbook_max_entries: 500
playbook_injection_tokens: 500
playbook_update_threshold: 0.7
playbook_dedup_interval_days: 7

# ── HERMES Memory System ──────────────────────────────────────────────────────
memory_working_max_messages: 30
memory_episodic_max_episodes: 365
memory_retrieval_max_tokens: 800
memory_skill_writing_enabled: true
memory_encryption_enabled: true
memory_obsidian_weekly_export: true
session_greeting_enabled: true

# ── Obsidian as Single Source of Truth ────────────────────────────────────────
obsidian_atlas_folder: "ATLAS"
obsidian_memory_folder: "ATLAS/Memory"
obsidian_playbook_folder: "ATLAS/Playbook"
obsidian_skills_folder: "ATLAS/Skills"
obsidian_improvements_folder: "ATLAS/Improvements"
obsidian_watch_for_changes: true
obsidian_daily_note_folder: "ATLAS/Daily"
obsidian_weekly_review_enabled: true
obsidian_weekly_review_day: "sunday"
memory_max_context_tokens: 800
playbook_max_context_tokens: 500

# ── SOUL module ────────────────────────────────────────────────────────────────
soul_enabled: true
soul_auto_reload: true            # reload soul.md when edited in Obsidian

# ── Hermes Skills (directory-based, agentskills.io format) ────────────────────
hermes_skills_enabled: true
hermes_skills_folder: "ATLAS/Skills/Hermes"

# ── Trajectory compression ────────────────────────────────────────────────────
trajectory_compression_enabled: true
trajectory_trigger_messages: 25    # compress at this many messages
trajectory_trigger_tokens: 4000    # or at this estimated token count
trajectory_head_protect: 3         # turns to protect at start
trajectory_tail_protect: 4         # turns to protect at end

# ── FTS5 session search ────────────────────────────────────────────────────────
session_search_enabled: true
session_search_db: "memory/atlas_search.db"

# ── Cron scheduler ─────────────────────────────────────────────────────────────
scheduler_enabled: true
scheduler_db: "memory/atlas_jobs.db"
scheduler_morning_briefing_time: "08:00"
scheduler_weekly_review_day: "sunday"
scheduler_weekly_review_time: "19:00"

# ── Learning loop ──────────────────────────────────────────────────────────────
learning_loop_enabled: true
learning_loop_complexity_threshold: 6  # 0-10 score to write a new skill
learning_loop_outcome_threshold: 4     # score to record outcome on existing skill
learning_loop_low_success_rate: 0.5   # skills below this rate get 7-day review

# ── Context files ──────────────────────────────────────────────────────────────
context_files_enabled: true
context_files_scan_interval: 60       # seconds between automatic rescans
context_files_names: ["ATLAS.md", "AGENTS.md"]  # filenames to scan for

# ── Honcho user modeling ────────────────────────────────────────────────────────
honcho_enabled: true
honcho_update_every_sessions: 5       # sessions between user model updates
honcho_model_file: "ATLAS/Memory/honcho-model.md"

# ── Voice pipeline (Pipecat-inspired) ───────────────────────────────────────────
pipeline_interruption_enabled: true   # interrupt TTS when user starts speaking
noise_cancellation_enabled: true      # apply spectral noise reduction to mic input

# ── Lead agent planner (DeerFlow-inspired) ──────────────────────────────────────
planner_enabled: true
planner_complexity_threshold: 3       # steps before COMPLEX classification
subagent_timeout_seconds: 30          # max seconds per sub-agent
subagent_max_parallel: 4              # max concurrent parallel sub-agents

# ── Code agent (Smolagents-inspired) ────────────────────────────────────────────
code_agent_enabled: true
code_agent_timeout: 30                # seconds before sandbox subprocess is killed

# ── Offline / privacy mode (AgenticSeek-inspired) ───────────────────────────────
offline_mode_auto_detect: true        # poll connectivity every N seconds
offline_check_interval: 30            # seconds between connectivity probes
privacy_mode_enabled: false           # force local-only even with internet
offline_local_model: "ollama/llama3"  # local model to switch to when offline

# ── Context7 live documentation ──────────────────────────────────────────────────
context7_enabled: true
context7_cache_hours: 24              # hours before doc cache expires
context7_max_tokens: 5000             # max tokens of docs to inject per request

# ── Smart Card visualizer widget ─────────────────────────────────────────────
smart_card_enabled: true
smart_card_position: top-right        # top-right | top-left | bottom-right | bottom-left
smart_card_auto_dismiss: false
smart_card_dismiss_seconds: 30        # seconds before card auto-closes (ignored when auto_dismiss is false)
smart_card_max_visible: 3             # max simultaneous cards
smart_card_image_enabled: true        # fetch images for products/news/media
smart_card_image_cache_hours: 24      # hours to cache fetched images

# ── Screen Recorder ───────────────────────────────────────────────────────────
recordings_folder: "~/Desktop/ATLAS_Projects/Recordings"
recording_fps: 30                     # ffmpeg capture framerate
commentary_interval_seconds: 3        # seconds between AI screenshot narrations

# ── Personal Coach ────────────────────────────────────────────────────────────
coach_enabled: true
coach_max_active_goals: 5             # maximum simultaneous coaching goals
coach_checkin_reminder_days: 2        # days of silence before proactive check-in nudge

# ── Debate Engine ─────────────────────────────────────────────────────────────
debate_enabled: true
debate_auto_save_obsidian: true       # auto-save all debate results to vault

# ── Socratic Tutor ────────────────────────────────────────────────────────────
tutor_enabled: true
tutor_questions_per_session: 20       # Socratic questions before session ends
tutor_summary_interval: 5             # generate synthesis summary every N questions
tutor_save_notes: true                # auto-save session notes to Obsidian vault

# ── Academic Research ─────────────────────────────────────────────────────────
research_enabled: true
research_max_results: 10              # max papers returned per search (across all sources)
research_auto_save_obsidian: false    # auto-save all research to vault (manual save = false)

# ── 3D Hologram System ────────────────────────────────────────────────────────
hologram_enabled: true
hologram_color: "#4FC3F7"             # default hologram tint (cyan)
hologram_bloom_strength: 0.85        # UnrealBloomPass strength (0.0–3.0)
hologram_scanline_speed: 2.8         # scanline scroll speed in GLSL (higher = faster)
hologram_brightness: 1.3             # renderer tone mapping exposure
hologram_fps_target: 60              # target FPS (informational; Three.js uses rAF)
hologram_auto_dismiss_seconds: 0     # seconds before hologram auto-closes (0 = never)
hologram_default_state: "orb"        # initial layout: orb | active | fullscreen

