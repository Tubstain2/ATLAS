<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS</title>
<!-- Three.js import map — loaded only when hologram activates -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163/examples/jsm/"
  }
}
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #050810;
  --blue:        #00CFFF;
  --blue-dim:    rgba(0,180,220,0.35);
  --blue-glow:   rgba(0,180,220,0.12);
  --text:        rgba(200,235,255,0.88);
  --text-dim:    rgba(140,190,220,0.45);
  --text-faint:  rgba(100,160,200,0.25);
  --border:      rgba(0,180,220,0.14);
  --sidebar-w:   290px;
  --font-mono:   'Share Tech Mono','Menlo','Courier New',monospace;
  --font-ui:     -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  user-select: none;
  -webkit-user-select: none;
}

/* dot grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(0,180,220,0.045) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

/* ── Title bar (drag region) ──────────────────────────────────────────── */
#titlebar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 38px;
  -webkit-app-region: drag;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  z-index: 100;
}
.traffic {
  display: flex; gap: 7px;
  -webkit-app-region: no-drag;
}
.traffic-btn {
  width: 12px; height: 12px; border-radius: 50%; border: none;
  cursor: pointer; opacity: 0.75; transition: opacity 0.15s;
  background: rgba(0,180,220,0.25);
  display: flex; align-items: center; justify-content: center;
}
.traffic-btn:hover { opacity: 1; }
.traffic-btn.close  { background: #FF5F57; }
.traffic-btn.min    { background: #FFBD2E; }
.traffic-btn.full   { background: #27C93F; }

.titlebar-right {
  display: flex; align-items: center; gap: 10px;
  -webkit-app-region: no-drag;
}

/* icon buttons (camera, sidebar toggle) */
.icon-btn {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); transition: color 0.2s, background 0.2s;
}
.icon-btn:hover { color: var(--blue); background: rgba(0,180,220,0.08); }
.icon-btn.active { color: var(--blue); }

.camera-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-faint); margin-left: -4px; margin-top: -10px;
  transition: background 0.3s;
}
.camera-dot.live { background: #27C93F; box-shadow: 0 0 6px #27C93F; }

/* ── Main layout ──────────────────────────────────────────────────────── */
#main {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1;
  transition: right 0.3s ease;
}
#main.sidebar-open { right: var(--sidebar-w); }

/* ── Orb area ─────────────────────────────────────────────────────────── */
#orb-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
  margin-top: -20px;
}

#orb-canvas {
  width: 320px; height: 320px;
  display: block;
}

#orb-name {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 2px;
}

#clock {
  font-family: var(--font-mono);
  font-size: 42px;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-top: 10px;
  line-height: 1;
}

#date-str {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--text-faint);
  margin-top: 5px;
  text-transform: uppercase;
}

#state-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-faint);
  margin-top: 14px;
  min-height: 16px;
  transition: color 0.3s;
}

/* ── Transcript strip (bottom) ────────────────────────────────────────── */
#transcript-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center;
  padding-bottom: 12px;
  z-index: 10;
  pointer-events: none;
  transition: right 0.3s ease;
}
#transcript-wrap.sidebar-open { right: var(--sidebar-w); }

#transcript {
  width: 100%; max-width: 680px;
  display: flex; flex-direction: column;
  gap: 2px;
  padding: 0 20px;
}

.tx-line {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-dim);
  opacity: 1;
  transition: opacity 1.5s ease;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tx-line.faded { opacity: 0; }
.tx-line.atlas-line { color: var(--blue-dim); }
.tx-line .tx-label { color: var(--text-faint); margin-right: 6px; }

/* text input */
#input-bar {
  width: 100%; max-width: 680px;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 20px 0;
  pointer-events: all;
}
#text-input {
  flex: 1;
  background: rgba(0,180,220,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 12px;
  outline: none;
  resize: none;
  height: 34px;
  transition: border-color 0.2s;
}
#text-input:focus { border-color: rgba(0,180,220,0.35); }
#text-input::placeholder { color: var(--text-faint); }
#send-btn {
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); transition: color 0.2s, border-color 0.2s;
}
#send-btn:hover { color: var(--blue); border-color: rgba(0,180,220,0.4); }

/* ── Right sidebar ────────────────────────────────────────────────────── */
#sidebar {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: var(--sidebar-w);
  background: rgba(5,8,18,0.92);
  border-left: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 50;
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 48px 0 16px;
}
#sidebar.visible { transform: translateX(0); }

.sidebar-section {
  padding: 14px 18px;
  border-bottom: 1px solid rgba(0,180,220,0.06);
}
.sidebar-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ── NOW PLAYING widget ───────────────────────────────────────────────── */
#np-nothing-s {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-faint);
}
#np-content-s { display: none; }
#np-title-s {
  font-size: 13px; font-weight: 500;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#np-artist-s {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-dim); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wf-bars { display: flex; gap: 2px; margin-top: 6px; align-items: flex-end; height: 14px; }
.wf-bar {
  width: 3px; background: var(--blue-dim); border-radius: 2px;
  animation: none; transition: height 0.2s;
}
.wf-bar.playing { animation: wf-pulse 0.8s ease-in-out infinite; }
.wf-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
.wf-bar:nth-child(2) { height: 10px; animation-delay: 0.12s; }
.wf-bar:nth-child(3) { height: 14px; animation-delay: 0.24s; }
.wf-bar:nth-child(4) { height: 8px; animation-delay: 0.08s; }
.wf-bar:nth-child(5) { height: 12px; animation-delay: 0.16s; }
@keyframes wf-pulse {
  0%,100% { opacity: 0.4; transform: scaleY(0.5); }
  50%      { opacity: 1.0; transform: scaleY(1.0); }
}
#np-progress-s {
  height: 2px; background: rgba(0,180,220,0.12);
  border-radius: 1px; margin-top: 8px;
}
#np-fill-s { height: 100%; width: 0%; background: var(--blue-dim); border-radius: 1px; transition: width 1s linear; }
.np-times { display: flex; justify-content: space-between; margin-top: 3px;
  font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }

/* ── WEATHER widget ───────────────────────────────────────────────────── */
#weather-val {
  font-family: var(--font-mono); font-size: 28px; color: var(--text);
  margin-bottom: 2px;
}
#weather-desc {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
}
.weather-row { display: flex; gap: 14px; margin-top: 8px; }
.weather-stat { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
.weather-stat span { color: var(--text-dim); }

/* ── SYSTEM stats ─────────────────────────────────────────────────────── */
.stat-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.stat-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; }
.stat-bar { flex: 1; height: 3px; background: rgba(0,180,220,0.1); border-radius: 2px; margin: 0 10px; }
.stat-fill { height: 100%; border-radius: 2px; background: var(--blue-dim); transition: width 0.6s ease; }
.stat-val { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); min-width: 30px; text-align: right; }

/* ── NEWS feed ────────────────────────────────────────────────────────── */
#feed-items {
  display: flex; flex-direction: column; gap: 8px;
  max-height: 200px; overflow-y: auto;
}
#feed-items::-webkit-scrollbar { width: 2px; }
#feed-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }
.feed-item {
  font-size: 11px; line-height: 1.4; color: var(--text-dim);
  padding-left: 8px;
  border-left: 2px solid rgba(0,180,220,0.2);
}
.fi-ts { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); margin-top: 2px; }

/* ── OBSIDIAN / REMINDERS ────────────────────────────────────────────── */
.obs-item, .rem-item {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  padding: 3px 0; border-bottom: 1px solid rgba(0,180,220,0.04);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── TOAST ────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; top: 48px; left: 50%; transform: translateX(-50%) translateY(-6px);
  background: rgba(5,8,18,0.92); border: 1px solid var(--border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 8px; padding: 8px 18px;
  font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 200;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SETTINGS overlay ────────────────────────────────────────────────── */
#settings-overlay {
  position: fixed; inset: 0; background: rgba(3,5,14,0.75);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 300;
}
#settings-overlay.open { display: flex; }
#settings-panel {
  background: rgba(6,8,20,0.96); border: 1px solid var(--border);
  border-radius: 12px; padding: 28px 32px; width: 360px;
  font-family: var(--font-mono);
}
.settings-title {
  font-size: 11px; letter-spacing: 0.3em; color: var(--text-faint);
  text-transform: uppercase; margin-bottom: 20px;
}
.settings-close {
  float: right; background: none; border: none;
  cursor: pointer; color: var(--text-dim); font-size: 16px;
  margin-top: -4px;
}

/* scrollbar global */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: rgba(0,180,220,0.15); border-radius: 2px; }

/* ── Hologram layout states ────────────────────────────────────────────── */

/* Make orb independently positionable so it can slide to corner */
#orb-wrap {
  position: fixed !important;
  top: 50%; left: 50%;
  transform: translate(-50%, -54%) scale(1);
  transition: top 400ms cubic-bezier(0.34,1.56,0.64,1),
              left 400ms cubic-bezier(0.34,1.56,0.64,1),
              transform 400ms cubic-bezier(0.34,1.56,0.64,1);
  z-index: 5;
  margin-top: 0 !important;
}

/* State 2: hologram active — orb mini top-left */
body.hologram-active #orb-wrap {
  top: 56px; left: 16px;
  transform: translate(0,0) scale(0.44);
}

/* State 3: hologram fullscreen — orb dot */
body.hologram-fullscreen #orb-wrap {
  top: 56px; left: 16px;
  transform: translate(0,0) scale(0.13);
}

body.hologram-fullscreen #sidebar { display: none !important; }
body.hologram-fullscreen #main    { display: none !important; }

/* Hologram container */
#hologram-container {
  position: fixed;
  top: 46px; left: 0; right: 0; bottom: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 400ms ease;
  z-index: 4;
  display: flex;
  flex-direction: column;
  background: #000000;
}
body.hologram-active #hologram-container,
body.hologram-fullscreen #hologram-container {
  opacity: 1;
  pointer-events: all;
}

/* Hologram state 2: compress transcript to bottom strip */
body.hologram-active #transcript-wrap {
  max-height: 30vh;
  overflow: hidden;
}

#hologram-header {
  position: absolute;
  top: 10px; right: 14px;
  display: flex; align-items: center; gap: 12px;
  z-index: 20;
}
#hologram-status {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.3em;
  color: rgba(79,195,247,0.5);
  text-transform: uppercase;
  animation: holo-blink 3s ease-in-out infinite;
}
@keyframes holo-blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
#hologram-label {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.2em;
  color: rgba(79,195,247,0.7);
  text-transform: uppercase;
}
#hologram-close-btn {
  background: rgba(79,195,247,0.07);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 5px;
  color: rgba(79,195,247,0.65);
  cursor: pointer; padding: 4px 12px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}
#hologram-close-btn:hover {
  background: rgba(79,195,247,0.14);
  color: #4FC3F7;
  border-color: rgba(79,195,247,0.5);
}

/* Three.js canvas fills the container */
#hologram-canvas-wrap {
  flex: 1; width: 100%;
  overflow: hidden;
  position: relative;
}
#hologram-canvas-wrap canvas {
  display: block; width: 100% !important; height: 100% !important;
}

/* Scanline overlay on top of canvas */
#hologram-canvas-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 1;
}

/* Corner mini-orb label */
#orb-mini-label {
  position: fixed;
  top: 174px; left: 10px;
  font-family: var(--font-mono);
  font-size: 8px; letter-spacing: 0.25em;
  color: rgba(79,195,247,0.5);
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 300ms ease 200ms;
  z-index: 6; pointer-events: none;
}
body.hologram-active #orb-mini-label { opacity: 1; }
body.hologram-fullscreen #orb-mini-label { opacity: 0; }
</style>
</head>
<body>

<!-- ── Title bar ─────────────────────────────────────────────────────────── -->
<div id="titlebar">
  <div class="traffic">
    <button class="traffic-btn close"  onclick="atlasClose()"></button>
    <button class="traffic-btn min"    onclick="atlasMinimise()"></button>
    <button class="traffic-btn full"   onclick="atlasFullscreen()"></button>
  </div>
  <div class="titlebar-right">
    <!-- Camera toggle -->
    <div style="position:relative; display:flex; align-items:center;">
      <button class="icon-btn" id="cam-btn" onclick="toggleCamera()" title="Toggle camera">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1 4.5A1.5 1.5 0 0 1 2.5 3h7A1.5 1.5 0 0 1 11 4.5v7A1.5 1.5 0 0 1 9.5 13h-7A1.5 1.5 0 0 1 1 11.5v-7z" stroke="currentColor" stroke-width="1.2"/>
          <path d="M11 6.5l3-2v7l-3-2V6.5z" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
      <div class="camera-dot" id="cam-dot"></div>
    </div>
    <!-- Sidebar toggle -->
    <button class="icon-btn" id="sidebar-btn" onclick="toggleSidebar()" title="Widgets">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <rect x="1" y="2" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="1" y="6.75" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="1" y="11.5" width="13" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>
    <!-- Settings -->
    <button class="icon-btn" onclick="openSettings()" title="Settings">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.93 2.93l1.06 1.06M11.01 11.01l1.06 1.06M2.93 12.07l1.06-1.06M11.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Main: orb + clock ──────────────────────────────────────────────────── -->
<div id="main">
  <div id="orb-wrap">
    <canvas id="orb-canvas" width="320" height="320"></canvas>
    <div id="orb-name">A T L A S</div>
    <div id="clock">00:00</div>
    <div id="date-str">–</div>
    <div id="state-label">[ READY ]</div>
  </div>
</div>

<!-- ── Mini-orb label (visible only in hologram states) ──────────────────── -->
<div id="orb-mini-label">ATLAS</div>

<!-- ── 3D Hologram container ──────────────────────────────────────────────── -->
<div id="hologram-container">
  <div id="hologram-header">
    <span id="hologram-status">● HOLOGRAM ACTIVE</span>
    <span id="hologram-label"></span>
    <button id="hologram-close-btn" onclick="hideHologram()">[ CLOSE ]</button>
  </div>
  <div id="hologram-canvas-wrap"></div>
</div>

<!-- ── Transcript + input (bottom) ───────────────────────────────────────── -->
<div id="transcript-wrap">
  <div id="transcript"></div>
  <div id="input-bar">
    <input id="text-input" type="text" placeholder="ask atlas something…"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"/>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M12.5 7L2 2l2.5 5L2 12l10.5-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Right sidebar ──────────────────────────────────────────────────────── -->
<div id="sidebar">

  <!-- Now Playing -->
  <div class="sidebar-section" id="now-playing-widget">
    <div class="sidebar-label">Now Playing</div>
    <div id="np-nothing-s">[ NO SIGNAL ]</div>
    <div id="np-content-s">
      <div id="np-title-s">—</div>
      <div id="np-artist-s">—</div>
      <div class="wf-bars">
        <div class="wf-bar"></div><div class="wf-bar"></div>
        <div class="wf-bar"></div><div class="wf-bar"></div><div class="wf-bar"></div>
      </div>
      <div id="np-progress-s"><div id="np-fill-s"></div></div>
      <div class="np-times"><span id="np-el-s">0:00</span><span id="np-tot-s">0:00</span></div>
    </div>
  </div>

  <!-- Weather -->
  <div class="sidebar-section" id="weather-widget">
    <div class="sidebar-label">Weather</div>
    <div id="weather-val">—°</div>
    <div id="weather-desc">—</div>
    <div class="weather-row">
      <div class="weather-stat">HUM <span id="weather-hum">—</span></div>
      <div class="weather-stat">WIND <span id="weather-wind">—</span></div>
    </div>
  </div>

  <!-- System -->
  <div class="sidebar-section" id="system-widget">
    <div class="sidebar-label">System</div>
    <div class="stat-row">
      <div class="stat-name">CPU</div>
      <div class="stat-bar"><div class="stat-fill" id="s-cpu-bar" style="width:0%"></div></div>
      <div class="stat-val" id="s-cpu">—</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   ATLAS UI — JARVIS-STYLE
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Clock ──────────────────────────────────────────────────────────────── */
var _DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var _MONTHS= ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function _tick() {
  var d = new Date();
  var hh = String(d.getHours()).padStart(2,'0');
  var mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = hh + ':' + mm;
  document.getElementById('date-str').textContent =
    _DAYS[d.getDay()].toUpperCase() + ' · ' +
    String(d.getDate()).padStart(2,'0') + ' ' + _MONTHS[d.getMonth()].toUpperCase() + ' ' + d.getFullYear();
}
_tick();
setInterval(_tick, 1000);

function nowTime() {
  var d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

/* ── Orb canvas ─────────────────────────────────────────────────────────── */
var _cvs    = document.getElementById('orb-canvas');
var _ctx    = _cvs.getContext('2d');
var _amp    = 0;
var _orbState = 'idle';
var _orbT   = 0;

var _STATE_COLORS = {
  idle:       { r:0,  g:150, b:200, a:0.55 },
  listening:  { r:0,  g:200, b:255, a:0.85 },
  thinking:   { r:100,g:80,  b:255, a:0.75 },
  responding: { r:0,  g:200, b:255, a:0.90 },
  detecting:  { r:0,  g:220, b:160, a:0.75 },
};
var _curColor = { r:0, g:150, b:200, a:0.55 };

function _lerpC(a,b,t){
  return { r:a.r+(b.r-a.r)*t, g:a.g+(b.g-a.g)*t,
           b:a.b+(b.b-a.b)*t, a:a.a+(b.a-a.a)*t };
}

function _drawOrb() {
  var W=320, H=320, cx=W/2, cy=H/2;
  _ctx.clearRect(0,0,W,H);

  var target = _STATE_COLORS[_orbState] || _STATE_COLORS.idle;
  _curColor  = _lerpC(_curColor, target, 0.04);
  var c = _curColor;

  // breathing multiplier
  var breath = 1 + Math.sin(_orbT * 0.018) * 0.04;
  var excite  = 1 + _amp * 0.22;
  var R = 110 * breath * excite;

  // outer glow rings
  for(var i=3;i>0;i--){
    var grad = _ctx.createRadialGradient(cx,cy,R*0.85*i*0.3,cx,cy,R*1.5*(0.5+i*0.2));
    grad.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+','+(c.a*0.06*i)+')');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    _ctx.beginPath();
    _ctx.arc(cx,cy,R*1.5*(0.5+i*0.2),0,Math.PI*2);
    _ctx.fillStyle=grad;
    _ctx.fill();
  }

  // main orb
  var mainGrad = _ctx.createRadialGradient(cx-R*0.25,cy-R*0.2,R*0.05,cx,cy,R);
  mainGrad.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+','+Math.min(c.a*1.15,1)+')');
  mainGrad.addColorStop(0.5,'rgba('+c.r+','+c.g+','+c.b+','+(c.a*0.7)+')');
  mainGrad.addColorStop(1,'rgba('+Math.round(c.r*0.4)+','+Math.round(c.g*0.4)+','+Math.round(c.b*0.5)+',0.08)');
  _ctx.beginPath();
  _ctx.arc(cx,cy,R,0,Math.PI*2);
  _ctx.fillStyle=mainGrad;
  _ctx.fill();

  // specular highlight
  var specGrad = _ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,0,cx-R*0.3,cy-R*0.3,R*0.55);
  specGrad.addColorStop(0,'rgba(255,255,255,0.18)');
  specGrad.addColorStop(1,'rgba(255,255,255,0)');
  _ctx.beginPath();
  _ctx.arc(cx,cy,R,0,Math.PI*2);
  _ctx.fillStyle=specGrad;
  _ctx.fill();

  // outer ring
  _ctx.beginPath();
  _ctx.arc(cx,cy,R+2,0,Math.PI*2);
  _ctx.strokeStyle='rgba('+c.r+','+c.g+','+c.b+','+(c.a*0.35)+')';
  _ctx.lineWidth=1;
  _ctx.stroke();

  // rotating tick ring (outer)
  var tickR = R + 18;
  for(var k=0;k<36;k++){
    var ang = (k/36)*Math.PI*2 + _orbT*0.008;
    var len = (k%3===0) ? 7 : 3;
    _ctx.beginPath();
    _ctx.moveTo(cx+Math.cos(ang)*tickR, cy+Math.sin(ang)*tickR);
    _ctx.lineTo(cx+Math.cos(ang)*(tickR+len), cy+Math.sin(ang)*(tickR+len));
    _ctx.strokeStyle='rgba('+c.r+','+c.g+','+c.b+','+(k%3===0?c.a*0.55:c.a*0.2)+')';
    _ctx.lineWidth=1;
    _ctx.stroke();
  }

  // counter-rotating inner ring
  var innerR = R - 20;
  _ctx.beginPath();
  _ctx.arc(cx,cy,innerR,0,Math.PI*2);
  _ctx.strokeStyle='rgba('+c.r+','+c.g+','+c.b+',0.08)';
  _ctx.lineWidth=1;
  _ctx.stroke();

  // arc segment on inner ring
  var arcStart = _orbT * -0.012;
  _ctx.beginPath();
  _ctx.arc(cx,cy,innerR,arcStart,arcStart+Math.PI*0.6);
  _ctx.strokeStyle='rgba('+c.r+','+c.g+','+c.b+','+(c.a*0.5)+')';
  _ctx.lineWidth=1.5;
  _ctx.stroke();

  // amplitude ripples
  if(_amp > 0.05){
    for(var ri=1;ri<=3;ri++){
      var rph = (_orbT*0.04+ri*0.3)%(1);
      var rr  = R*(1+rph*0.5);
      _ctx.beginPath();
      _ctx.arc(cx,cy,rr,0,Math.PI*2);
      _ctx.strokeStyle='rgba('+c.r+','+c.g+','+c.b+','+(_amp*(0.25-rph*0.25))+')';
      _ctx.lineWidth=1;
      _ctx.stroke();
    }
  }

  // center dot
  _ctx.beginPath();
  _ctx.arc(cx,cy,3,0,Math.PI*2);
  _ctx.fillStyle='rgba(255,255,255,0.6)';
  _ctx.fill();

  _orbT++;
  requestAnimationFrame(_drawOrb);
}
_drawOrb();

/* ── State & amplitude ──────────────────────────────────────────────────── */
var _stateColors = {

/* ── Transcript strip ───────────────────────────────────────────────────── */
var _TX_MAX = 4;
var _txLines = [];
var _txFadeTimers = {};

function _addTranscriptLine(who, text) {
  var strip = document.getElementById('transcript');
  var line  = document.createElement('div');
  var isAtlas = (who === 'atlas');
  line.className = 'tx-line' + (isAtlas ? ' atlas-line' : '');

  var label = document.createElement('span');
  label.className = 'tx-label';
  label.textContent = isAtlas ? 'atlas:' : 'you:';
  line.appendChild(label);
  line.appendChild(document.createTextNode(text.length > 120 ? text.slice(0,120)+'…' : text));
  strip.appendChild(line);
  _txLines.push(line);

  // keep max entries
  while(_txLines.length > _TX_MAX) {
    var old = _txLines.shift();
    if(old.parentNode) old.parentNode.removeChild(old);
  }

  // auto-fade after 18s
  var id = setTimeout(function(){ line.classList.add('faded'); }, 18000);
  if(_txFadeTimers[line]) clearTimeout(_txFadeTimers[line]);
  _txFadeTimers[line] = id;
}

function addEntry(text, isAtlas) {
  _addTranscriptLine(isAtlas ? 'atlas' : 'user', text);
}

var _twTimer = null;
var _twBuf   = '';

function showResponse(text) {
  if(_twTimer){ clearInterval(_twTimer); _twTimer=null; }
  _twBuf = '';

  var strip = document.getElementById('transcript');
  var line  = document.createElement('div');
  line.className = 'tx-line atlas-line';
  var label = document.createElement('span');
  label.className = 'tx-label'; label.textContent = 'atlas:';
  line.appendChild(label);
  var span = document.createElement('span');
  line.appendChild(span);
  strip.appendChild(line);
  _txLines.push(line);
  while(_txLines.length > _TX_MAX) {
    var old = _txLines.shift();
    if(old.parentNode) old.parentNode.removeChild(old);
  }

  var idx = 0;
  _twTimer = setInterval(function(){
    if(idx >= text.length){
      clearInterval(_twTimer); _twTimer = null;
      setState('idle');
      var fid = setTimeout(function(){ line.classList.add('faded'); }, 18000);
      _txFadeTimers[line] = fid;
      return;
    }
    idx += 2;
    var visible = text.slice(0,idx);
    span.textContent = visible.length > 120 ? visible.slice(0,120)+'…' : visible;
  }, 14);
}

function atlasTypewriter(text) { showResponse(text); }

/* ── NOW PLAYING ─────────────────────────────────────────────────────────── */
var _npPos=0,_npDur=0,_npPlaying=false,_npInterval=null;
function fmtTime(s){ var m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

function updateSpotify(d) {
  _npPlaying = !!(d && d.playing && d.track);
  _npPos = (d&&d.position)||0; _npDur = (d&&d.duration)||0;
  var n = document.getElementById('np-nothing-s');
  var c = document.getElementById('np-content-s');
  var bars = document.querySelectorAll('.wf-bar');
  if(!_npPlaying){
    n.style.display='block'; c.style.display='none';
    bars.forEach(function(b){b.classList.remove('playing');}); return;
  }
  n.style.display='none'; c.style.display='block';
  document.getElementById('np-title-s').textContent  = d.track  || '—';
  document.getElementById('np-artist-s').textContent = d.artist || '—';
  bars.forEach(function(b){b.classList.add('playing');});
  _updateNpProgress();
  if(_npInterval) clearInterval(_npInterval);
  _npInterval = setInterval(function(){ if(_npPlaying){_npPos++;_updateNpProgress();} }, 1000);
}
function _updateNpProgress(){
  var pct = _npDur>0 ? (_npPos/_npDur)*100 : 0;
  document.getElementById('np-fill-s').style.width = Math.min(pct,100)+'%';
  document.getElementById('np-el-s').textContent   = fmtTime(_npPos);
  document.getElementById('np-tot-s').textContent  = fmtTime(_npDur);
}

<!-- ═══════════════════════════════════════════════════════════════════════════
     ATLAS 3D HOLOGRAPHIC SYSTEM — Three.js r163 (loaded from CDN)

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

/* ── GLSL Holographic Shader ─────────────────────────────────────────────── */
const HOLO_VS = `
uniform float time;
uniform float amplitude;
varying vec2  vUv;
varying vec3  vNormal;
varying vec3  vPosition;
varying vec3  vViewPos;
void main(){
  vUv      = uv;
  vNormal  = normalize(normalMatrix * normal);
  vPosition= position;
  float glitch = sin(time*4.0 + position.y*18.0) * 0.004 * (0.4 + amplitude*0.6);
  vec3 p   = position;
  p.x     += glitch;
  vec4 mv  = modelViewMatrix * vec4(p,1.0);
  vViewPos = -mv.xyz;
  gl_Position = projectionMatrix * mv;
}`;

const HOLO_FS = `
uniform float time;
uniform vec3  color;
uniform float opacity;
uniform float amplitude;
varying vec2  vUv;
varying vec3  vNormal;
varying vec3  vPosition;
varying vec3  vViewPos;
void main(){
  float scanline = sin(vPosition.y*55.0 - time*2.8)*0.5+0.5;
  float scanFac  = mix(0.82,1.0,scanline*0.22);
  vec3 norm      = normalize(vNormal);
  vec3 view      = normalize(vViewPos);
  float fresnel  = pow(1.0-abs(dot(norm,view)),2.2);
  float flicker  = 1.0 - sin(time*17.3)*0.015;
  float noise    = fract(sin(dot(vUv,vec2(12.9898,78.233))+time*0.07)*43758.5453)*0.035;
  vec3  col      = color*(1.0+fresnel*0.55+amplitude*0.25)+noise;
  float alpha    = opacity*scanFac*flicker;
  gl_FragColor   = vec4(col,alpha);
}`;

function makeHoloMat(hex=0x4FC3F7, op=0.72){
  return new THREE.ShaderMaterial({
    uniforms:{
      time:{value:0}, color:{value:new THREE.Color(hex)},
      opacity:{value:op}, amplitude:{value:0}
    },
    vertexShader:HOLO_VS, fragmentShader:HOLO_FS,
    transparent:true, side:THREE.DoubleSide, depthWrite:false
  });
}

/* ── Scene state ─────────────────────────────────────────────────────────── */
let scene,camera,renderer,controls,composer,bloomPass;
let animId=null, isActive=false, vizGroup=new THREE.Group();
let coreOrbMesh,coreOrbParticles,coreOrbTorus,gridMesh,panelGroup;
let clock=new THREE.Clock(), ampVal=0, atlasState='idle';
let allHoloMats=[];

const CYAN=0x4FC3F7;
const CAT_COLORS={
  skill:0x4FC3F7, memory:0x9B59B6, research:0x27AE60,
  playbook:0xE67E22, coaching:0xE74C3C, daily:0x3498DB, note:0xECF0F1
};

/* ── Scene init (lazy) ───────────────────────────────────────────────────── */
function initScene(){
  if(renderer) return;
  const wrap=document.getElementById('hologram-canvas-wrap');
  const W=wrap.clientWidth||800, H=wrap.clientHeight||500;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x000000);
  scene.fog=new THREE.FogExp2(0x000508,0.028);
  scene.add(vizGroup);

  camera=new THREE.PerspectiveCamera(45,W/H,0.1,200);
  camera.position.set(0,4,9);

  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.toneMapping=THREE.ReinhardToneMapping;
  renderer.toneMappingExposure=1.3;
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(CYAN,0.07));
  const pl=new THREE.PointLight(CYAN,1.6,30); pl.position.set(0,6,0); scene.add(pl);
  const pl2=new THREE.PointLight(0xffffff,0.3,20); pl2.position.set(-4,-2,4); scene.add(pl2);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true; controls.dampingFactor=0.06;
  controls.minDistance=2; controls.maxDistance=25;

  composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  bloomPass=new UnrealBloomPass(new THREE.Vector2(W,H),0.85,0.45,0.28);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());

  buildCoreOrb();
  buildGrid();
  buildFloatingPanels();

  window.addEventListener('resize',onResize);
  startLoop();
}

/* ── Persistent: core orb ────────────────────────────────────────────────── */
function buildCoreOrb(){
  const mat=makeHoloMat(CYAN,0.55);
  allHoloMats.push(mat);
  coreOrbMesh=new THREE.Mesh(new THREE.SphereGeometry(0.9,32,32),mat);
  scene.add(coreOrbMesh);

  // Torus ring
  const tmat=makeHoloMat(CYAN,0.35); allHoloMats.push(tmat);
  coreOrbTorus=new THREE.Mesh(new THREE.TorusGeometry(1.4,0.03,8,64),tmat);
  scene.add(coreOrbTorus);

  // Particle ring
  const pts=[]; const R=2.2;
  for(let i=0;i<180;i++){
    const a=i/180*Math.PI*2, y=Math.sin(i*0.31)*0.4;
    pts.push(Math.cos(a)*R,y,Math.sin(a)*R);
  }
  const bg=new THREE.BufferGeometry();
  bg.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  coreOrbParticles=new THREE.Points(bg,
    new THREE.PointsMaterial({color:CYAN,size:0.04,transparent:true,opacity:0.6}));
  scene.add(coreOrbParticles);
}

/* ── Persistent: floor grid ──────────────────────────────────────────────── */
function buildGrid(){
  const g=new THREE.GridHelper(30,30,0x0d3040,0x061820);
  g.position.y=-2.5;
  g.material.opacity=0.35; g.material.transparent=true;
  scene.add(g);
  gridMesh=g;
}

/* ── Persistent: floating data panels ───────────────────────────────────── */
function buildFloatingPanels(){
  panelGroup=new THREE.Group();
  const labels=['SYS','TIME','NET'];
  for(let i=0;i<3;i++){
    const a=i/3*Math.PI*2;
    const mat=makeHoloMat(CYAN,0.18); allHoloMats.push(mat);
    const plane=new THREE.Mesh(new THREE.PlaneGeometry(0.9,0.55),mat);
    plane.position.set(Math.cos(a)*3.5,0.5,Math.sin(a)*3.5);
    plane.lookAt(0,0.5,0);
    panelGroup.add(plane);
  }
  scene.add(panelGroup);
}

/* ── Animation loop ──────────────────────────────────────────────────────── */
function startLoop(){
  if(animId) return;
  (function loop(){
    animId=requestAnimationFrame(loop);
    const t=clock.getElapsedTime();

    // Update shader uniforms
    allHoloMats.forEach(m=>{ m.uniforms.time.value=t; m.uniforms.amplitude.value=ampVal; });
    vizGroup.traverse(o=>{
      if(o.material&&o.material.uniforms&&o.material.uniforms.time){
        o.material.uniforms.time.value=t;
        o.material.uniforms.amplitude.value=ampVal;
      }
    });

    // Animate core orb
    if(coreOrbMesh){
      coreOrbMesh.rotation.y=t*0.3;
      const pulse=1+Math.sin(t*2.0)*0.04+ampVal*0.15;
      coreOrbMesh.scale.setScalar(pulse);
      coreOrbTorus.rotation.x=t*0.4; coreOrbTorus.rotation.z=t*0.15;
      coreOrbParticles.rotation.y=t*0.12;
    }
    panelGroup&&(panelGroup.rotation.y=t*0.06);

    controls.update();
    composer.render();
  })();
}

function pauseLoop(){ if(animId){cancelAnimationFrame(animId);animId=null;} }

function onResize(){
  if(!renderer) return;
  const w=document.getElementById('hologram-canvas-wrap');
  const W=w.clientWidth, H=w.clientHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
  composer.setSize(W,H);
}

/* ── Clear current visualization ─────────────────────────────────────────── */
function clearViz(){
  vizGroup.traverse(o=>{
    if(o.geometry) o.geometry.dispose();
    if(o.material){
      if(Array.isArray(o.material)) o.material.forEach(m=>m.dispose());
      else o.material.dispose();
    }
  });
  while(vizGroup.children.length) vizGroup.remove(vizGroup.children[0]);
}

/* ── Stock bar chart ─────────────────────────────────────────────────────── */
function buildStockChart(data){
  clearViz();
  const bars=data.bars||[];
  if(!bars.length) return;
  const maxC=Math.max(...bars.map(b=>b.c));
  const minC=Math.min(...bars.map(b=>b.c));
  const range=maxC-minC||1;
  bars.forEach((b,i)=>{
    const h=0.5+((b.c-minC)/range)*3.5;
    const up=b.c>=b.o;
    const col=up?0x4FC3F7:0xFF4757;
    const mat=makeHoloMat(col,0.78); allHoloMats.push(mat);
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(0.18,h,0.18),mat);
    mesh.position.set(i*0.22-bars.length*0.11,h/2-2.5,-1);
    mesh.scale.y=0; // animate in
    vizGroup.add(mesh);
    // Stagger entrance
    const delay=i*30;
    setTimeout(()=>{
      const start=performance.now();
      (function grow(){
        const p=Math.min(1,(performance.now()-start)/500);
        mesh.scale.y=p; mesh.position.y=h*p/2-2.5;
        if(p<1) requestAnimationFrame(grow);
      })();
    },delay);
  });
  // Ticker label
  const lmat=makeHoloMat(CYAN,0.9); allHoloMats.push(lmat);
  document.getElementById('hologram-label').textContent=data.ticker||'';
}

/* ── Knowledge graph ─────────────────────────────────────────────────────── */
function buildKnowledgeGraph(data){
  clearViz();
  const nodes=data.nodes||[], edges=data.edges||[];
  const nodeObjs=[];
  nodes.forEach(n=>{
    const col=CAT_COLORS[n.category]||0xECF0F1;
    const mat=makeHoloMat(col,0.7); allHoloMats.push(mat);
    const r=n.size*0.25+0.1;
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(r,10,10),mat);
    // Spread nodes in 3D sphere
    const phi=Math.acos(1-2*(n.id+0.5)/Math.max(nodes.length,1));
    const theta=Math.PI*(1+Math.sqrt(5))*n.id;
    const rad=3.5;
    mesh.position.set(
      rad*Math.sin(phi)*Math.cos(theta),
      rad*Math.cos(phi),
      rad*Math.sin(phi)*Math.sin(theta)
    );
    mesh.userData={label:n.label};
    vizGroup.add(mesh);
    nodeObjs.push(mesh);
  });
  // Edges
  edges.slice(0,150).forEach(e=>{
    const a=nodeObjs[e.s], b=nodeObjs[e.t];
    if(!a||!b) return;
    const pts=[a.position,b.position];
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(geo,
      new THREE.LineBasicMaterial({color:CYAN,opacity:0.18,transparent:true}));
    vizGroup.add(line);
  });
  // Slow auto-rotate
  (function spin(){
    if(!isActive) return;
    vizGroup.rotation.y+=0.002;
    requestAnimationFrame(spin);
  })();
}

/* ── Architecture diagram ────────────────────────────────────────────────── */
function buildArchitecture(data){
  clearViz();
  const mods=data.modules||[], conns=data.connections||[];
  const nodeObjs=[];
  mods.forEach(m=>{
    const mat=makeHoloMat(CYAN,0.65); allHoloMats.push(mat);
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.25,0.12),mat);
    mesh.position.set(m.x*0.85,0,m.y*0.85);
    mesh.userData={label:m.label,id:m.id};
    vizGroup.add(mesh);
    nodeObjs[m.id]=mesh;
  });
  conns.forEach(([a,b])=>{
    const na=nodeObjs[a], nb=nodeObjs[b];
    if(!na||!nb) return;
    const pts=[na.position.clone(),nb.position.clone()];
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(geo,
      new THREE.LineBasicMaterial({color:CYAN,opacity:0.3,transparent:true}));
    vizGroup.add(line);
  });
  // Animate data packets along connections
  conns.slice(0,8).forEach(([a,b],i)=>{
    const na=nodeObjs[a], nb=nodeObjs[b];
    if(!na||!nb) return;
    const pkt=new THREE.Mesh(
      new THREE.SphereGeometry(0.055,6,6),
      new THREE.MeshBasicMaterial({color:0xffffff}));
    vizGroup.add(pkt);
    let t=i*0.3;
    (function move(){
      if(!isActive) return;
      t=(t+0.007)%1;
      pkt.position.lerpVectors(na.position,nb.position,t);
      requestAnimationFrame(move);
    })();
  });
}

/* ── 3D Globe ────────────────────────────────────────────────────────────── */
function buildGlobe(){
  clearViz();
  const mat=makeHoloMat(0x2ECC71,0.45); allHoloMats.push(mat);
  const globe=new THREE.Mesh(new THREE.SphereGeometry(2.2,32,32),mat);
  vizGroup.add(globe);
  // Latitude / longitude lines
  for(let lat=-80;lat<=80;lat+=20){
    const r=lat/180*Math.PI;
    const pts=[];
    for(let i=0;i<=64;i++){
      const lon=i/64*Math.PI*2;
      pts.push(new THREE.Vector3(
        2.21*Math.cos(r)*Math.cos(lon),
        2.21*Math.sin(r),
        2.21*Math.cos(r)*Math.sin(lon)));
    }
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    vizGroup.add(new THREE.Line(g,
      new THREE.LineBasicMaterial({color:0x27AE60,opacity:0.25,transparent:true})));
  }
  for(let lon=0;lon<360;lon+=30){
    const r=lon/180*Math.PI;
    const pts=[];
    for(let i=0;i<=32;i++){
      const lat=(i/32-0.5)*Math.PI;
      pts.push(new THREE.Vector3(
        2.21*Math.cos(lat)*Math.cos(r),
        2.21*Math.sin(lat),
        2.21*Math.cos(lat)*Math.sin(r)));
    }
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    vizGroup.add(new THREE.Line(g,
      new THREE.LineBasicMaterial({color:0x27AE60,opacity:0.18,transparent:true})));
  }
  // City dots
  [[51,0],[40,-74],[35,139],[34,118],[-34,151],[48,2],[55,37]]
  .forEach(([lat,lon])=>{
    const phi=(90-lat)/180*Math.PI, theta=(lon+180)/180*Math.PI;
    const dot=new THREE.Mesh(
      new THREE.SphereGeometry(0.06,6,6),
      new THREE.MeshBasicMaterial({color:0x4FC3F7}));
    dot.position.set(
      2.28*Math.sin(phi)*Math.cos(theta),
      2.28*Math.cos(phi),
      2.28*Math.sin(phi)*Math.sin(theta));
    vizGroup.add(dot);
  });
  (function spin(){
    if(!isActive) return;
    globe.rotation.y+=0.004; vizGroup.rotation.y+=0.001;
    requestAnimationFrame(spin);
  })();
}

/* ── Code treemap ────────────────────────────────────────────────────────── */
function buildTreemap(data){
  clearViz();
  const files=data.files||[];
  const maxL=Math.max(...files.map(f=>f.lines),1);
  const latest=Math.max(...files.map(f=>f.mtime),1);
  const cols=Math.ceil(Math.sqrt(files.length));
  files.forEach((f,i)=>{
    const h=0.4+((f.lines/maxL)*2.5);
    const freshness=(f.mtime/latest);
    const col=freshness>0.98?0xF1C40F:freshness>0.9?0x4FC3F7:0x2C3E50;
    const mat=makeHoloMat(col,0.7); allHoloMats.push(mat);
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(0.45,h,0.45),mat);
    mesh.position.set((i%cols)*0.55-cols*0.275,h/2-2.5,Math.floor(i/cols)*0.55-2);
    vizGroup.add(mesh);
  });
}

/* ── Quick models ────────────────────────────────────────────────────────── */
function buildQuick(type){
  clearViz();
  if(type==='dna')     buildDNA();
  else if(type==='solar')  buildSolar();
  else if(type==='brain')  buildNeuralNet();
  else if(type==='city')   buildCity();
  else if(type==='atom')   buildAtom();
  else if(type==='network')buildNetwork();
  else buildAtom();
}

function buildDNA(){
  const mat=makeHoloMat(CYAN,0.7); allHoloMats.push(mat);
  const mat2=makeHoloMat(0xE74C3C,0.65); allHoloMats.push(mat2);
  const pts1=[],pts2=[];
  for(let i=0;i<120;i++){
    const t=i/120, a=t*Math.PI*8, h=t*5-2.5;
    pts1.push(new THREE.Vector3(Math.cos(a)*0.9,h,Math.sin(a)*0.9));
    pts2.push(new THREE.Vector3(Math.cos(a+Math.PI)*0.9,h,Math.sin(a+Math.PI)*0.9));
    if(i%8===0){
      const rung=new THREE.Mesh(
        new THREE.CylinderGeometry(0.03,0.03,1.8,6),
        makeHoloMat(0xF1C40F,0.6));
      rung.position.set(0,h,0);
      rung.rotation.x=Math.PI/2;
      rung.rotation.z=a;
      vizGroup.add(rung);
    }
  }
  const g1=new THREE.BufferGeometry().setFromPoints(pts1);
  const g2=new THREE.BufferGeometry().setFromPoints(pts2);
  vizGroup.add(new THREE.Line(g1,new THREE.LineBasicMaterial({color:CYAN,linewidth:2})));
  vizGroup.add(new THREE.Line(g2,new THREE.LineBasicMaterial({color:0xE74C3C,linewidth:2})));
  (function spin(){if(!isActive)return; vizGroup.rotation.y+=0.008; requestAnimationFrame(spin);})();
}

function buildSolar(){
  // Sun
  const sunMat=makeHoloMat(0xF39C12,0.85); allHoloMats.push(sunMat);
  vizGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.6,16,16),sunMat));
  // Planets
  const planets=[
    [0.09,0.8,0xAAAAAA,3.0],
    [0.13,1.3,0xE8A97E,2.2],
    [0.14,1.9,CYAN,1.6],
    [0.10,2.5,0xFF6B6B,1.2],
    [0.40,3.6,0xD4A57A,0.7],
  ];
  planets.forEach(([r,orb,col,sp],i)=>{
    const mat=makeHoloMat(col,0.75); allHoloMats.push(mat);
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(r,12,12),mat);
    const pivot=new THREE.Object3D(); pivot.add(mesh);
    mesh.position.x=orb;
    // Orbit ring
    const oring=new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(
        Array.from({length:65},(_,k)=>{
          const a=k/64*Math.PI*2;
          return new THREE.Vector3(orb*Math.cos(a),0,orb*Math.sin(a));
        })),
      new THREE.LineBasicMaterial({color:col,opacity:0.18,transparent:true}));
    vizGroup.add(oring);
    vizGroup.add(pivot);
    let angle=i*1.3;
    (function orbit(){
      if(!isActive) return;
      angle+=0.005*sp; pivot.rotation.y=angle;
      requestAnimationFrame(orbit);
    })();
  });
}

function buildNeuralNet(){
  const layers=[3,5,5,3];
  const nodeMap=[];
  layers.forEach((n,li)=>{
    const row=[];
    for(let ni=0;ni<n;ni++){
      const mat=makeHoloMat(CYAN,0.7); allHoloMats.push(mat);
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.15,10,10),mat);
      mesh.position.set(li*1.8-2.7,(ni-(n-1)/2)*0.9,0);
      vizGroup.add(mesh);
      row.push(mesh);
    }
    if(li>0){
      nodeMap[li-1].forEach(a=>row.forEach(b=>{
        const geo=new THREE.BufferGeometry().setFromPoints([a.position,b.position]);
        vizGroup.add(new THREE.Line(geo,
          new THREE.LineBasicMaterial({color:CYAN,opacity:0.15,transparent:true})));
      }));
    }
    nodeMap.push(row);
  });
  // Pulse signal
  (function pulse(){
    if(!isActive) return;
    const t=clock.getElapsedTime();
    nodeMap.forEach((row,li)=>row.forEach(m=>{
      const p=Math.sin(t*2+li*0.7)*0.5+0.5;
      m.material.uniforms.opacity.value=0.4+p*0.5;
    }));
    requestAnimationFrame(pulse);
  })();
}

function buildCity(){
  const seed=12345;
  function rng(i){return((seed*i*1664525+1013904223)&0x7fffffff)/0x7fffffff;}
  for(let i=0;i<32;i++){
    const w=rng(i*3)*0.5+0.2, d=rng(i*3+1)*0.5+0.2, h=rng(i*3+2)*2+0.3;
    const x=(rng(i*7)-0.5)*8, z=(rng(i*11)-0.5)*8;
    const col=i%4===0?CYAN:i%3===0?0x8E44AD:0x2C3E50;
    const mat=makeHoloMat(col,0.55); allHoloMats.push(mat);
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    mesh.position.set(x,h/2-2.5,z);
    vizGroup.add(mesh);
  }
}

function buildAtom(){
  // Nucleus
  const nmat=makeHoloMat(0xE74C3C,0.8); allHoloMats.push(nmat);
  vizGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.28,12,12),nmat));
  // Electron shells
  [1.2,2.0,2.8].forEach((r,si)=>{
    const axis=new THREE.Vector3(
      si===0?0:si===1?1:0.7,
      si===0?1:si===1?0:0.7,
      si===0?0:si===1?0:0.1).normalize();
    // Ring
    const pts=Array.from({length:65},(_,k)=>{
      const a=k/64*Math.PI*2;
      return new THREE.Vector3(r*Math.cos(a),r*Math.sin(a),0);
    });
    const ring=new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:CYAN,opacity:0.3,transparent:true}));
    ring.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),axis);
    vizGroup.add(ring);
    // Electron
    const emat=makeHoloMat(CYAN,0.9); allHoloMats.push(emat);
    const electron=new THREE.Mesh(new THREE.SphereGeometry(0.09,8,8),emat);
    vizGroup.add(electron);
    let angle=si*2.1;
    const speed=0.8-si*0.15;
    (function orbit(){
      if(!isActive) return;
      angle+=0.02*speed;
      const v=new THREE.Vector3(r*Math.cos(angle),r*Math.sin(angle),0);
      v.applyQuaternion(ring.quaternion);
      electron.position.copy(v);
      requestAnimationFrame(orbit);
    })();
  });
}

function buildNetwork(){
  const N=12;
  const nodeList=[];
  for(let i=0;i<N;i++){
    const a=i/N*Math.PI*2, r=1.8+(i%3)*0.8;
    const mat=makeHoloMat(CYAN,0.75); allHoloMats.push(mat);
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),mat);
    mesh.position.set(r*Math.cos(a),Math.sin(i*0.9)*0.7,r*Math.sin(a));
    vizGroup.add(mesh);
    nodeList.push(mesh);
  }
  // Edges
  for(let i=0;i<N;i++){
    for(let j=i+1;j<N;j++){
      if(Math.abs(i-j)<=3||(i===0&&j===N-1)){
        const geo=new THREE.BufferGeometry()
          .setFromPoints([nodeList[i].position,nodeList[j].position]);
        vizGroup.add(new THREE.Line(geo,
          new THREE.LineBasicMaterial({color:CYAN,opacity:0.22,transparent:true})));
      }
    }
  }
  (function spin(){if(!isActive)return; vizGroup.rotation.y+=0.005; requestAnimationFrame(spin);})();
}

/* ── Loading spinner ─────────────────────────────────────────────────────── */
function buildLoading(data){
  clearViz();
  document.getElementById('hologram-label').textContent=
    'Generating: '+(data.label||'');
  const mat=makeHoloMat(CYAN,0.5); allHoloMats.push(mat);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(1.2,0.06,8,48),mat);
  vizGroup.add(ring);
  (function spin(){
    if(!isActive||vizGroup.children.length>1) return;
    ring.rotation.z+=0.04; ring.rotation.x+=0.01;
    requestAnimationFrame(spin);
  })();
}

/* ── AI-generated mesh ───────────────────────────────────────────────────── */
function applyGeneratedMesh(fnCode){
  clearViz();
  try{
    // eslint-disable-next-line no-new-func
    const fn=new Function('THREE',`${fnCode}; return buildMesh();`);
    const group=fn(THREE);
    group.traverse(o=>{
      if(o.isMesh){
        const m=makeHoloMat(CYAN,0.7); allHoloMats.push(m);
        o.material=m;
      }
    });
    vizGroup.add(group);
    (function spin(){if(!isActive)return; group.rotation.y+=0.006; requestAnimationFrame(spin);})();
  }catch(e){
    console.warn('Hologram: mesh eval failed:',e);
    buildQuick('atom');
  }
}

/* ── Crossfade switch ────────────────────────────────────────────────────── */
function switchViz(buildFn){
  const wrap=document.getElementById('hologram-canvas-wrap');
  wrap.style.transition='opacity 200ms';
  wrap.style.opacity='0';
  setTimeout(()=>{
    buildFn();
    wrap.style.opacity='1';
  },200);
}

window.showHologram = function(type, data){
  initScene();
  isActive=true;
  document.body.classList.remove('hologram-fullscreen');
  document.body.classList.add('hologram-active');
  document.getElementById('hologram-label').textContent='';

  switchViz(()=>{
    if(type==='stock')        buildStockChart(data);
    else if(type==='knowledge') buildKnowledgeGraph(data);
    else if(type==='architecture') buildArchitecture(data);
    else if(type==='globe')   buildGlobe();
    else if(type==='treemap') buildTreemap(data);
    else if(type==='quick')   buildQuick(data.model||'atom');
    else if(type==='loading') buildLoading(data);
    else clearViz();   // default — just the core orb and grid
  });
  if(!animId) startLoop();
};

window.hideHologram = function(){
  isActive=false;
  document.body.classList.remove('hologram-active','hologram-fullscreen');
  clearViz();
  pauseLoop();
};

window.hologramFullscreen = function(){
  initScene();
  isActive=true;
  document.body.classList.remove('hologram-active');
  document.body.classList.add('hologram-fullscreen');
  if(!animId) startLoop();
  setTimeout(onResize,420);
};

window.hologramAmplitude = function(v){
  ampVal=v;
};

window.hologramState = function(state){
  atlasState=state;
  if(coreOrbMesh){
    const colMap={
      idle:CYAN, listening:0x00CFFF,
      thinking:0x8844FF, responding:0x00EEFF
    };
    const c=colMap[state]||CYAN;
    coreOrbMesh.material.uniforms.color.value.setHex(c);
  }
};

window.hologramScale = function(f){
  vizGroup.scale.multiplyScalar(f);
};

window.hologramWireframe = function(on){
  vizGroup.traverse(o=>{
    if(o.isMesh&&o.material) o.material.wireframe=on;
  });
};

window.hologramResetView = function(){
  if(!camera||!controls) return;
  camera.position.set(0,4,9);
  controls.target.set(0,0,0);
  controls.update();
  vizGroup.scale.set(1,1,1);
};

window.hologramAutoRotate = function(on){
  if(controls) controls.autoRotate=on;
};

window.hologramUpdateData = function(data){
  if(!isActive) return;
  switchViz(()=>{
    if(data.bars)    buildStockChart(data);
    else if(data.nodes) buildKnowledgeGraph(data);
    else if(data.files) buildTreemap(data);
    else if(data.modules) buildArchitecture(data);
  });
};

window.hologramBuildMesh = function(fnCode){
  if(!isActive){initScene(); isActive=true; document.body.classList.add('hologram-active');}
  switchViz(()=>applyGeneratedMesh(fnCode));
  if(!animId) startLoop();
};

window.hologramScreenshot = function(){
  if(!renderer) return;
  renderer.render(scene,camera);
  const url=renderer.domElement.toDataURL('image/png');
  const a=document.createElement('a');
  a.href=url; a.download='atlas-hologram.png'; a.click();
};

window.hologramShowChat = function(){
  document.body.classList.remove('hologram-active','hologram-fullscreen');
  setTimeout(()=>document.body.classList.add('hologram-active'),3000);
};

console.log('[ATLAS] Hologram module loaded — Three.js r163');
</script>
</body>
</html>
